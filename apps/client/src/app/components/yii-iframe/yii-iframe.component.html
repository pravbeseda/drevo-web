<div class="yii-iframe-container">
    <!-- Loading indicator -->
    <div
        *ngIf="isLoading"
        class="loading-overlay">
        <div class="spinner"></div>
        <p>Загрузка...</p>
    </div>

    <!-- Error message -->
    <div
        *ngIf="hasError"
        class="error-container">
        <div class="error-message">
            <h3>⚠️ Ошибка загрузки страницы</h3>
            <p>{{ errorMessage }}</p>
            <button
                (click)="reload()"
                class="retry-button">
                Повторить попытку
            </button>
        </div>
    </div>

    <!-- Iframe for Yii content -->
    <iframe
        #yiiFrame
        [src]="initialSrc"
        [class.hidden]="hasError"
        (load)="onIframeLoad()"
        (error)="onIframeError()"
        class="yii-iframe"
        title="Yii Content"></iframe>
</div>
