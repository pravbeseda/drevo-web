<ul class="filter-list" role="radiogroup" aria-label="Фильтры статей">
    <li>
        <button
            class="filter-item"
            role="radio"
            [attr.aria-checked]="activeFilter() === 'all'"
            [class.active]="activeFilter() === 'all'"
            (click)="onSelect('all')">
            Все
        </button>
    </li>
    <li>
        <button
            class="filter-item"
            role="radio"
            [attr.aria-checked]="activeFilter() === 'unchecked'"
            [class.active]="activeFilter() === 'unchecked'"
            (click)="onSelect('unchecked')">
            Непроверенные
        </button>
    </li>
    <li class="filter-section-header">В работе</li>
    <li>
        <button
            class="filter-item nested"
            role="radio"
            [attr.aria-checked]="activeFilter() === 'unfinished'"
            [class.active]="activeFilter() === 'unfinished'"
            (click)="onSelect('unfinished')">
            Неоконченные
        </button>
    </li>
    <li>
        <button
            class="filter-item nested"
            role="radio"
            [attr.aria-checked]="activeFilter() === 'unmarked'"
            [class.active]="activeFilter() === 'unmarked'"
            (click)="onSelect('unmarked')">
            Неразмеченные
        </button>
    </li>
    <li>
        <button
            class="filter-item nested"
            role="radio"
            [attr.aria-checked]="activeFilter() === 'outside_dictionaries'"
            [class.active]="activeFilter() === 'outside_dictionaries'"
            (click)="onSelect('outside_dictionaries')">
            Вне словников
        </button>
    </li>
    <li>
        <button
            class="filter-item nested"
            role="radio"
            [attr.aria-checked]="activeFilter() === 'required'"
            [class.active]="activeFilter() === 'required'"
            (click)="onSelect('required')">
            Требующиеся
        </button>
    </li>
    @if (canFilterByAuthor()) {
        <li>
            <button
                class="filter-item"
                role="radio"
                [attr.aria-checked]="activeFilter() === 'my'"
                [class.active]="activeFilter() === 'my'"
                (click)="onSelect('my')">
                Мои
            </button>
        </li>
    }
</ul>
