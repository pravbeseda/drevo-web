<div class="moderation-panel-status">
    <ui-status-icon [status]="version().approved" />
    <span>{{ statusText() }}</span>
</div>

<div class="moderation-panel-info">
    <div class="moderation-panel-info-row">
        <span class="moderation-panel-info-label">Автор:</span>
        <span>{{ version().author }}</span>
    </div>
    <div class="moderation-panel-info-row">
        <span class="moderation-panel-info-label">Время:</span>
        <span>{{ version().date | formatDate }}</span>
    </div>
</div>

<ui-text-input
    label="Комментарий"
    [multiline]="true"
    [rows]="3"
    [value]="comment()"
    (valueChanged)="onCommentChange($event)"
/>

<div class="moderation-panel-actions">
    @if (!isApproved()) {
        <ui-button
            accent="primary"
            [disabled]="isLoading()"
            [loading]="isLoading()"
            (click)="approve()"
        >
            Одобрить
        </ui-button>
    }
    @if (!isPending()) {
        <ui-button
            variant="outlined"
            [disabled]="isLoading()"
            [loading]="isLoading()"
            (click)="sendToReview()"
        >
            На проверку
        </ui-button>
    }
    @if (!isRejected()) {
        <ui-button
            variant="outlined"
            [disabled]="isLoading()"
            [loading]="isLoading()"
            (click)="reject()"
        >
            Отклонить
        </ui-button>
    }
</div>
