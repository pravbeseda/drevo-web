@if (canModerate()) {
    <app-sidebar-action
        [order]="50"
        [icon]="moderationIcon()"
        label="Модерация"
        [priority]="priority()"
        [disabled]="disabled()"
        (activated)="togglePanel()"
    />

    <ui-side-panel
        header="Модерация"
        [open]="isPanelOpen()"
        (closed)="closePanel()"
    >
        <app-article-moderation-panel
            [version]="version()"
            (moderated)="onModerated($event)"
        />
    </ui-side-panel>
}
