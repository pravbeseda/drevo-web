<app-sidebar-action
    icon="filter_list"
    label="Фильтры"
    priority="secondary"
    (activated)="openFilters()"
/>

<ui-side-panel
    header="Фильтр"
    [open]="isSidePanelOpen()"
    aria-label="Фильтры"
    (closed)="isSidePanelOpen.set(false)"
>
    <app-filters
        [filters]="filters()"
        [activeFilter]="activeFilter()"
        (filterChange)="onFilterChange($event)"
    />
</ui-side-panel>
