<app-sidebar-action
    icon="filter_list"
    label="Фильтры"
    priority="secondary"
    (activated)="openFilters()"
/>

<ui-side-panel
    header="Фильтры"
    [open]="isSidePanelOpen()"
    (closed)="isSidePanelOpen.set(false)"
>
    <app-filters
        [filters]="filters()"
        [activeFilter]="activeFilter()"
        (filterChange)="onFilterChange($event)"
    />

    <div class="hide-cancelled-toggle">
        <ui-toggle
            label="Скрыть отменённые"
            data-testid="hide-cancelled-toggle"
            [ngModel]="hideCancelled()"
            (valueChanged)="onHideCancelledChange($event)"
        />
    </div>
</ui-side-panel>
