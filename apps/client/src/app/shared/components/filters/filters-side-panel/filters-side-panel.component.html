<button
    sidebarAction
    icon="filter_list"
    label="Фильтры"
    priority="secondary"
    (click)="openFilters()"
></button>

<ui-side-panel
    [open]="isSidePanelOpen()"
    aria-label="Фильтры"
    (closed)="isSidePanelOpen.set(false)"
>
    <app-filters
        [filters]="filters()"
        [activeFilter]="activeFilter()"
        (filterChange)="onFilterChange($event)"
    />
</ui-side-panel>
