<div class="draft-discard-dialog">
    <h2 class="draft-discard-dialog__title">Удалить черновик?</h2>
    <p class="draft-discard-dialog__message">
        Вы уверены, что хотите удалить черновик? Несохранённые изменения будут потеряны.
    </p>
    <div class="draft-discard-dialog__actions">
        <ui-button variant="secondary" (clicked)="cancel()">Остаться</ui-button>
        <ui-button variant="primary" (clicked)="confirm()">Удалить</ui-button>
    </div>
</div>
