<div class="layout" [class.sidebar-collapsed]="!isDrawerOpen()">
    <header class="header">
        <app-header></app-header>
    </header>

    @if (isMobile()) {
        <div
            class="drawer-backdrop"
            [class.visible]="isDrawerOpen()"
            (click)="closeDrawer()"
            aria-hidden="true"></div>
    }

    <aside
        class="left"
        [class.drawer-open]="isDrawerOpen()"
        aria-label="Primary sidebar">
        <div class="left-content">
            <app-sidebar-nav />
        </div>
        @if (isDrawerOpen()) {
            <app-version-display />
        }
    </aside>

    <main
        class="main"
        id="content">
        <ng-content></ng-content>
    </main>

    <aside
        class="right"
        [class.has-actions]="hasActions()"
        aria-label="Secondary sidebar">
        <ui-right-sidebar />
    </aside>
</div>
