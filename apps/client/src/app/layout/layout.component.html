<div
    class="layout"
    [class.sidebar-collapsed]="!isDrawerOpen()"
    [class.skip-transition]="skipTransition()"
>
    <header
        class="header"
        data-testid="header"
    >
        <app-header></app-header>
        <ui-navigation-progress [isNavigating]="isNavigating()" />
    </header>

    <div
        class="drawer-backdrop"
        [class.visible]="isMobile() && isDrawerOpen()"
        (click)="closeDrawer()"
        aria-hidden="true"
    ></div>

    <aside
        class="left"
        [class.drawer-open]="isDrawerOpen()"
        aria-label="Primary sidebar"
        data-testid="sidebar"
    >
        <div class="left-content">
            <app-sidebar-nav />
        </div>
        @if (isDrawerOpen()) {
            <app-version-display />
        }
    </aside>

    <main
        #contentEl
        class="main"
        id="content"
    >
        <ng-content></ng-content>
    </main>

    <aside
        class="right"
        [class.has-actions]="hasActions()"
        aria-label="Secondary sidebar"
    >
        <app-right-sidebar />
    </aside>
</div>

<app-picture-lightbox />
