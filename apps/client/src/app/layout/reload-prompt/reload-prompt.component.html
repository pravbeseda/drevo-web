<div
    class="backdrop"
    data-testid="reload-prompt"
    tabindex="-1"
    cdkTrapFocus
    cdkTrapFocusAutoCapture
    (keydown.escape)="onDismissClick()"
>
    <div class="card">
        <h2
            id="reload-prompt-title"
            class="title"
        >
            Приложение обновилось
        </h2>
        <p
            id="reload-prompt-body"
            class="body"
        >
            Откройте новую версию, чтобы продолжить работу. Ваши несохранённые изменения могут быть потеряны.
        </p>
        <!-- DOM order: reload first so cdkTrapFocusAutoCapture focuses it.
             Visual order reversed via flex-direction: row-reverse in SCSS. -->
        <div class="actions">
            <ui-button
                variant="filled"
                accent="primary"
                testId="reload-button"
                (click)="onReloadClick()"
            >
                Обновить
            </ui-button>
            <ui-button
                variant="text"
                testId="dismiss-button"
                (click)="onDismissClick()"
            >
                Отмена
            </ui-button>
        </div>
    </div>
</div>
