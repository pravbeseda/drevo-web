<ui-icon-button
    cdkOverlayOrigin
    #trigger="cdkOverlayOrigin"
    data-testid="font-scale-toggle"
    icon="text_fields"
    label="Размер шрифта"
    (clicked)="toggle()"
/>

<ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="trigger"
    [cdkConnectedOverlayOpen]="isOpen()"
    [cdkConnectedOverlayHasBackdrop]="true"
    cdkConnectedOverlayBackdropClass="font-scale-backdrop"
    (backdropClick)="close()"
    (overlayKeydown)="onOverlayKeydown($event)"
>
    <div
        class="font-scale-popup"
        data-testid="font-scale-popup"
    >
        <div class="font-scale-stepper">
            <ui-icon-button
                data-testid="font-scale-decrease"
                icon="remove"
                label="Уменьшить"
                [disabled]="!canDecrease()"
                (clicked)="decrease()"
            />
            <span
                class="font-scale-value"
                data-testid="font-scale-value"
            >
                {{ scalePercent() }}%
            </span>
            <ui-icon-button
                data-testid="font-scale-increase"
                icon="add"
                label="Увеличить"
                [disabled]="!canIncrease()"
                (clicked)="increase()"
            />
        </div>
        <ui-button
            data-testid="font-scale-reset"
            variant="text"
            [disabled]="isDefault()"
            (click)="reset()"
        >
            Сбросить
        </ui-button>
    </div>
</ng-template>
