<div class="header-brand">
    <ui-icon-button
        data-testid="hamburger-button"
        icon="menu"
        label="Меню"
        (clicked)="toggleDrawer()"
    />
    <ui-line-clamp
        class="page-title"
        data-testid="page-title"
        [tooltip]="pageTitle()"
    >
        {{ pageTitle() }}
    </ui-line-clamp>
</div>

<div class="header-actions">
    <ui-icon-button
        icon="search"
        label="Словник"
        (clicked)="openSearch()"
    />
    <app-font-scale-control></app-font-scale-control>
    <app-theme-toggle></app-theme-toggle>
    <app-account-dropdown></app-account-dropdown>
</div>
