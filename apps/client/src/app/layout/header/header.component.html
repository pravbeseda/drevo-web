<div class="header-brand">
    <ui-icon-button
        data-testid="hamburger-button"
        icon="menu"
        label="Меню"
        (clicked)="toggleDrawer()"
    />

    @if (isEditingTitle()) {
        <input
            #titleInput
            class="page-title-input"
            type="text"
            aria-label="Название статьи"
            [attr.maxlength]="titleMaxLength"
            [formControl]="titleControl"
            (keydown.enter)="onTitleEnter($event)"
            (keydown.escape)="cancelTitleEdit()"
            (blur)="onTitleBlur()"
            data-testid="page-title-input"
        />
    } @else {
        <ui-line-clamp
            class="page-title"
            [class.page-title--editable]="canRename()"
            data-testid="page-title"
            [tooltip]="pageTitle()"
            (click)="onTitleClick()"
        >
            {{ pageTitle() }}
        </ui-line-clamp>
    }
</div>

<div class="header-actions">
    <ui-icon-button
        data-testid="search-button"
        icon="search"
        label="Словник"
        (clicked)="openSearch()"
    />
    <app-font-scale-control></app-font-scale-control>
    <app-theme-toggle></app-theme-toggle>
    <app-account-dropdown></app-account-dropdown>
</div>
