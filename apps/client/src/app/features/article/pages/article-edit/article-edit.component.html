@if (isLoading()) {
    <div class="loading-container">
        <ui-spinner [diameter]="48" />
    </div>
} @else if (error()) {
    <app-error
        title="Ошибка"
        [message]="error()"
    />
} @else if (version(); as version) {
    <button
        sidebarAction
        icon="save"
        priority="primary"
        [disabled]="isSaving()"
        (click)="save()"
    >
        Сохранить
    </button>
    <button
        sidebarAction
        icon="close"
        priority="secondary"
        [disabled]="isSaving()"
        (click)="cancel()"
    >
        Отмена
    </button>

    <div class="article-edit">
        <header class="article-edit-header">
            <h1 class="article-edit-title">{{ version.title }}</h1>
        </header>
        <div class="editor-container">
            <lib-editor
                [content]="version.content"
                [linksStatus]="(updateLinksState$ | async) ?? {}"
                (updateLinksEvent)="updateLinks($event)"
                (contentChanged)="contentChanged($event)"
            />
        </div>
    </div>
}
