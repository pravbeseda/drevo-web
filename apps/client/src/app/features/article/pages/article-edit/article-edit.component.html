@if (error()) {
    <app-error
        title="Ошибка"
        [message]="error()"
    />
} @else {
    <app-sidebar-action
        [order]="30"
        icon="save"
        label="Сохранить"
        priority="primary"
        [disabled]="isSaving()"
        (activated)="save()"
    />
    <app-sidebar-action
        [order]="20"
        icon="close"
        label="Отмена"
        priority="secondary"
        [disabled]="isSaving()"
        (activated)="cancel()"
    />

    <ui-workspace (activeTabChange)="onTabChange($event)">
        <ui-workspace-tab
            label="Редактор"
            icon="edit"
            [keepAlive]="true"
        >
            <ng-template>
                <lib-editor
                    [content]="editorContent()"
                    [linksStatus]="updateLinksState()"
                    (updateLinksEvent)="updateLinks($event)"
                    (contentChanged)="contentChanged($event)"
                />
            </ng-template>
        </ui-workspace-tab>
        <ui-workspace-tab
            label="Просмотр"
            icon="visibility"
        >
            <ng-template>
                <app-preview
                    [content]="editorContent()"
                    [articleId]="articleId()"
                />
            </ng-template>
        </ui-workspace-tab>
        <ui-workspace-tab
            label="Что изменено"
            icon="difference"
        >
            <ng-template>
                <app-diff-view
                    [oldText]="originalContent()"
                    [newText]="editorContent()"
                />
            </ng-template>
        </ui-workspace-tab>
    </ui-workspace>
}
