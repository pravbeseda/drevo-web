@if (error()) {
    <app-error
        title="Ошибка"
        [message]="error()"
    />
} @else {
    <app-sidebar-action
        [order]="30"
        icon="save"
        label="Сохранить"
        priority="primary"
        [disabled]="isSaving()"
        testId="save-action"
        (activated)="save()"
    />
    <app-sidebar-action
        [order]="20"
        icon="close"
        label="Отмена"
        priority="secondary"
        [disabled]="isSaving()"
        testId="cancel-action"
        (activated)="cancel()"
    />

    <ui-workspace
        data-testid="article-edit"
        (activeTabChange)="onTabChange($event)"
    >
        <button
            workspaceTabBarAction
            type="button"
            class="validation-indicator"
            [class.validation-indicator--ok]="!hasProblems()"
            [uiTooltip]="validationTooltip()"
            data-testid="validation-indicator"
            (click)="toggleLintPanel()"
        >
            @if (hasErrors()) {
                <span class="validation-indicator__error">
                    <ui-icon name="error" size="small" />
                    <span>{{ validationResult().errors }}</span>
                </span>
            }
            @if (hasWarnings()) {
                <span class="validation-indicator__warning">
                    <ui-icon name="warning" size="small" />
                    <span>{{ validationResult().warnings }}</span>
                </span>
            }
            @if (!hasProblems()) {
                <ui-icon name="check_circle" size="small" />
            }
        </button>
        <ui-workspace-tab
            label="Редактор"
            icon="edit"
            [keepAlive]="true"
        >
            <ng-template>
                <lib-editor
                    data-testid="editor-container"
                    [content]="editorContent()"
                    [customExtensions]="editorExtensions"
                    [customActions]="customToolbarActions"
                    [linksStatus]="updateLinksState()"
                    (updateLinksEvent)="updateLinks($event)"
                    (contentChanged)="contentChanged($event)"
                    (validationChange)="onValidationChange($event)"
                />
            </ng-template>
        </ui-workspace-tab>
        <ui-workspace-tab
            label="Просмотр"
            icon="visibility"
        >
            <ng-template>
                <app-preview
                    [content]="editorContent()"
                    [articleId]="articleId()"
                />
            </ng-template>
        </ui-workspace-tab>
        <ui-workspace-tab
            label="Что изменено"
            icon="difference"
        >
            <ng-template>
                <app-diff-view
                    [oldText]="originalContent()"
                    [newText]="editorContent()"
                />
            </ng-template>
        </ui-workspace-tab>
    </ui-workspace>
}
