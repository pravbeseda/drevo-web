@if (error()) {
    <app-error
        data-testid="article-error"
        title="Ошибка"
        [message]="error()"
    />
} @else if (article()) {
    <app-sidebar-reserve />

    <article
        class="article"
        data-testid="article-page"
    >
        <ui-tabs-group [groups]="tabGroups()">
            <router-outlet />
        </ui-tabs-group>
    </article>
}
