@if (isLoading()) {
    <div
        class="preview-loading"
        data-testid="preview-loading"
    >
        <ui-spinner />
    </div>
} @else if (error()) {
    <app-error
        data-testid="preview-error"
        [message]="error()"
    />
} @else {
    <app-article-content
        data-testid="preview-content"
        [content]="previewHtml()"
    />
}
