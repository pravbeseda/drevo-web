<!-- Sidebar Actions -->
<button
    sidebarAction
    icon="toc"
    label="Содержание"
    priority="secondary"
    (click)="openTableOfContents()"
></button>
<button
    sidebarAction
    icon="edit"
    label="Редактировать"
    priority="primary"

></button>

<div [innerHTML]="sanitizedContent"></div>
