<div class="login-container">
    <div class="login-card">
        <h1>Вход</h1>

        <form
            [formGroup]="loginForm"
            (ngSubmit)="onSubmit()">
            <ui-text-input
                label="Логин"
                autocomplete="username"
                formControlName="username" />

            <ui-text-input
                label="Пароль"
                type="password"
                autocomplete="current-password"
                formControlName="password" />

            <ui-checkbox
                label="Запомнить меня"
                formControlName="rememberMe" />

            @if (errorMessage()) {
                <div
                    class="error-message"
                    role="alert">
                    {{ errorMessage() }}
                </div>
            }

            <ui-button
                type="submit"
                [loading]="isSubmitting()"
                [disabled]="loginForm.invalid"
                [fullWidth]="true">
                Войти
            </ui-button>
        </form>
    </div>
</div>
