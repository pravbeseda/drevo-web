<div class="pictures-page" data-testid="pictures-page">
    <app-picture-search-bar (searchChange)="onSearchChange($event)" />

    @if (isLoading()) {
        <div class="pictures-page__loading" data-testid="pictures-loading">
            <ui-spinner />
        </div>
    } @else if (hasResults()) {
        <div class="pictures-page__gallery" #galleryContainer data-testid="pictures-gallery">
            <ui-virtual-scroller
                [items]="rows()"
                [itemSize]="208"
                [totalItems]="totalRows()"
                [isLoading]="isLoadingMore()"
                [trackByFn]="trackByFn"
                (loadMore)="onLoadMore()"
            >
                <ng-template uiVirtualScrollerItem let-row>
                    <app-picture-row
                        [row]="row"
                        (pictureClick)="onPictureClick($event)"
                    />
                </ng-template>
            </ui-virtual-scroller>
        </div>
    } @else if (showNoResults()) {
        <div class="pictures-page__empty" data-testid="pictures-empty">Ничего не найдено</div>
    }
</div>
