@if (picture(); as pic) {
    <app-sidebar-action
        [order]="10"
        icon="content_copy"
        label="Копировать код вставки"
        priority="secondary"
        (activated)="copyInsertCode()"
    />
    <app-sidebar-action
        [order]="20"
        icon="edit"
        label="Изменить"
        priority="primary"
        (activated)="editPicture()"
    />
    <div class="detail__card">
        <div
            class="detail__image"
            (click)="onImageClick()"
            (keydown.enter)="onImageClick()"
            tabindex="0"
            role="button"
            data-testid="detail-image"
        >
            <img
                [src]="pic.imageUrl"
                [alt]="pic.title"
                loading="eager"
            />
        </div>
        <div class="detail__info">
            <h1
                class="detail__title"
                data-testid="detail-title"
            >
                {{ pic.title }}
            </h1>
            <div class="detail__author">
                <div class="detail__author-details">
                    <span class="detail__author-name">{{ pic.user }}</span>
                    <span class="detail__author-date">{{ pic.date | formatDate }}</span>
                </div>
            </div>
            @if (pic.width && pic.height) {
                <div class="detail__section">
                    <div class="detail__section-title">Размеры</div>
                    <span class="detail__dimensions">{{ pic.width }} × {{ pic.height }} px</span>
                </div>
            }
            <div class="detail__section">
                <div class="detail__section-title">Используется в статьях</div>
                <div class="detail__placeholder">Список статей (скоро)</div>
            </div>
        </div>
    </div>
} @else {
    <app-error
        title="Иллюстрация не найдена"
        message="Запрашиваемая иллюстрация не существует или была удалена."
        [showHomeButton]="true"
        data-testid="detail-error"
    />
}
