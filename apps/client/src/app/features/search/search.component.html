<div
    class="search-container"
    data-testid="search-container"
>
    <ui-text-input
        data-testid="search-input"
        label="Поиск"
        placeholder="Введите запрос..."
        (valueChanged)="onSearchChange($event)"
    />

    @if (isLoading()) {
        <ui-spinner data-testid="search-loading" />
    }

    @if (hasResults()) {
        <div
            class="search-results"
            data-testid="search-results"
        >
            <div class="search-results-header">Найдено: {{ totalResults() }}</div>
            <ui-virtual-scroller
                class="search-results-scroller"
                [items]="searchResults()"
                [totalItems]="totalResults()"
                [isLoading]="isLoadingMore()"
                [trackByFn]="trackByFn"
                (loadMore)="onLoadMore()"
            >
                <ng-template
                    uiVirtualScrollerItem
                    let-result
                >
                    <a
                        class="search-result-item"
                        data-testid="search-result-item"
                        [routerLink]="['/articles', result.id]"
                        (click)="closeModal()"
                        [innerHTML]="result.highlightedTitle ?? result.title"
                    ></a>
                </ng-template>
            </ui-virtual-scroller>
        </div>
    } @else if (showNoResults()) {
        <div
            class="search-no-results"
            data-testid="search-no-results"
        >
            Ничего не найдено
        </div>
    }
</div>
