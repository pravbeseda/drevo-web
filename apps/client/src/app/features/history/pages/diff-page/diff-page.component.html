@if (canModerate()) {
    <app-sidebar-action
        [icon]="moderationIcon()"
        [label]="'Модерация: ' + moderationLabel()"
        [disabled]="!isModerationEnabled()"
        (activated)="toggleModerationPanel()"
    />

    <ui-side-panel
        [open]="isModerationPanelOpen()"
        title="Модерация"
        (closed)="closeModerationPanel()"
    >
        @if (data.versionPairs(); as pairs) {
            <app-article-moderation-panel
                [versionPairs]="pairs"
                (moderated)="onModerated($event)"
            />
        }
    </ui-side-panel>
}

<app-sidebar-action
    [icon]="diffType() === 'cm' ? 'looks_two' : 'looks_one'"
    [label]="diffType() === 'cm' ? 'Переключить на JsDiff' : 'Переключить на CodeMirror'"
    (activated)="toggleDiffType()"
/>

@if (data.error()) {
    <div class="diff-page-error">
        <p>{{ data.error() }}</p>
    </div>
} @else if (data.versionPairs(); as pairs) {
    <div class="diff-page-meta">
        <span class="diff-page-meta-versions">
            <app-version-label [version]="pairs.previous" />
            <span class="version-arrow">&rarr;</span>
            <app-version-label [version]="pairs.current" />
        </span>
        @if (pairs.current.info) {
            <span class="diff-page-meta-comment">
                {{ pairs.current.info }}
            </span>
        }
    </div>

    @switch (diffType()) {
        @case ('cm') {
            <app-cm-diff-view />
        }
        @case ('jsdiff') {
            <app-diff-view />
        }
    }
}
