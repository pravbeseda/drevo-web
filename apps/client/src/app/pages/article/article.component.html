@if (isLoading()) {
    <div class="loading-container">
        <ui-spinner [diameter]="48" />
    </div>
} @else if (error()) {
    <app-error
        title="Ошибка"
        [message]="error()" />
} @else if (article(); as article) {
    <article class="article">
        <header class="article-header">
            <h1 class="article-title">{{ article.title }}</h1>
        </header>
        <ui-tabs-group [groups]="tabGroups()">
            <router-outlet />
        </ui-tabs-group>
    </article>
}
