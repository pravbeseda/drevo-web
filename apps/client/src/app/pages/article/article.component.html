@if (isLoading()) {
    <div class="loading-container">
        <ui-spinner [diameter]="48" />
    </div>
} @else if (error()) {
    <app-error
        title="Ошибка"
        [message]="error()" />
} @else if (article(); as article) {
    <!-- Sidebar Actions -->
    <button
        sidebarAction
        icon="toc"
        priority="secondary"
        (click)="openTableOfContents()">
        Содержание
    </button>
    <button
        sidebarAction
        icon="edit"
        priority="primary"
        [disabled]="!editUrl()"
        [href]="editUrl()">
        Редактировать
    </button>

    <article class="article">
        <header class="article-header">
            <h1 class="article-title">{{ article.title }}</h1>
        </header>
        <ui-tabs-group [groups]="tabGroups()">
            <router-outlet />
        </ui-tabs-group>
    </article>
}
