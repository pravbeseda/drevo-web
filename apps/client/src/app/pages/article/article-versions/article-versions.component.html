<button
    sidebarAction
    icon="filter_list"
    priority="secondary"
    (click)="openFilters()">
    Фильтры
</button>

<app-article-history-list />

<ui-side-panel
    [open]="isSidePanelOpen()"
    title="Фильтры"
    (closed)="isSidePanelOpen.set(false)">
    <app-filters
        [filters]="filters()"
        [activeFilter]="activeFilter()"
        (filterChange)="onFilterChange($event)" />
</ui-side-panel>
