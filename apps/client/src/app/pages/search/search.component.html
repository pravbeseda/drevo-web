<div class="search-container">
    <ui-text-input
        label="Поиск"
        placeholder="Введите запрос..."
        (valueChanged)="onSearchChange($event)" />

    @if (isLoading()) {
        <ui-spinner />
    }

    @if (hasResults()) {
        <div class="search-results">
            <div class="search-results-header">
                Найдено: {{ totalResults() }}
            </div>
            <ui-virtual-scroller
                class="search-results-scroller"
                [items]="searchResults()"
                [totalItems]="totalResults()"
                [isLoading]="isLoadingMore()"
                [trackByFn]="trackByFn"
                (loadMore)="onLoadMore()">
                <ng-template
                    uiVirtualScrollerItem
                    let-result>
                    <a
                        class="search-result-item"
                        [routerLink]="['/articles', result.id]"
                        [innerHTML]="
                            result.title | highlight: searchQuery()
                        "></a>
                </ng-template>
            </ui-virtual-scroller>
        </div>
    } @else if (showNoResults()) {
        <div class="search-no-results">Ничего не найдено</div>
    }
</div>
