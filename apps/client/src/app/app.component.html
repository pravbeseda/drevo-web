@if (showLayout()) {
    <app-layout>
        <router-outlet></router-outlet>
    </app-layout>
} @else {
    <router-outlet></router-outlet>
}

@if (appUpdateService.chunkLoadFailed()) {
    <app-reload-prompt
        (reload)="appUpdateService.reload()"
        (dismiss)="appUpdateService.dismiss()"
    />
}
