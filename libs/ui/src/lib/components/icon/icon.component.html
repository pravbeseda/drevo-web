@if (svgIcon(); as svg) {
    <mat-icon
        [class]="size()"
        [svgIcon]="svg"
        [matTooltip]="tooltip()"
        [matTooltipPosition]="tooltipPosition()"
    ></mat-icon>
} @else {
    <mat-icon
        [class]="size()"
        [matTooltip]="tooltip()"
        [matTooltipPosition]="tooltipPosition()"
    >
        {{ name() }}
    </mat-icon>
}
