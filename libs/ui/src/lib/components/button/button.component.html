<ng-template #buttonContent>
    @if (loading()) {
        <mat-spinner diameter="20" />
    }
    <span [class.loading]="loading()">
        <ng-content />
    </span>
</ng-template>

@if (link()) {
    @switch (variant()) {
        @case ('filled') {
            <a
                mat-flat-button
                [class]="accentClass()"
                [routerLink]="link()"
                [class.full-width]="fullWidth()"
                [class.disabled]="disabled() || loading()"
                [attr.aria-disabled]="disabled() || loading() || null"
                [attr.data-testid]="testId() ?? null"
                (click)="onLinkClick($event)"
            >
                <ng-container *ngTemplateOutlet="buttonContent" />
            </a>
        }
        @case ('outlined') {
            <a
                mat-stroked-button
                [class]="accentClass()"
                [routerLink]="link()"
                [class.full-width]="fullWidth()"
                [class.disabled]="disabled() || loading()"
                [attr.aria-disabled]="disabled() || loading() || null"
                [attr.data-testid]="testId() ?? null"
                (click)="onLinkClick($event)"
            >
                <ng-container *ngTemplateOutlet="buttonContent" />
            </a>
        }
        @default {
            <a
                mat-button
                [class]="accentClass()"
                [routerLink]="link()"
                [class.full-width]="fullWidth()"
                [class.disabled]="disabled() || loading()"
                [attr.aria-disabled]="disabled() || loading() || null"
                [attr.data-testid]="testId() ?? null"
                (click)="onLinkClick($event)"
            >
                <ng-container *ngTemplateOutlet="buttonContent" />
            </a>
        }
    }
} @else {
    @switch (variant()) {
        @case ('filled') {
            <button
                mat-flat-button
                [class]="accentClass()"
                [type]="type()"
                [disabled]="disabled() || loading()"
                [class.full-width]="fullWidth()"
                [attr.data-testid]="testId() ?? null"
            >
                <ng-container *ngTemplateOutlet="buttonContent" />
            </button>
        }
        @case ('outlined') {
            <button
                mat-stroked-button
                [class]="accentClass()"
                [type]="type()"
                [disabled]="disabled() || loading()"
                [class.full-width]="fullWidth()"
                [attr.data-testid]="testId() ?? null"
            >
                <ng-container *ngTemplateOutlet="buttonContent" />
            </button>
        }
        @default {
            <button
                mat-button
                [class]="accentClass()"
                [type]="type()"
                [disabled]="disabled() || loading()"
                [class.full-width]="fullWidth()"
                [attr.data-testid]="testId() ?? null"
            >
                <ng-container *ngTemplateOutlet="buttonContent" />
            </button>
        }
    }
}
