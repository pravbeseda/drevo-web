<ng-template #buttonContent>
    @if (loading()) {
        <mat-spinner diameter="20" />
    }
    <span [class.loading]="loading()">
        <ng-content />
    </span>
</ng-template>

@if (href()) {
    @switch (variant()) {
        @case ('primary') {
            <a
                mat-flat-button
                color="primary"
                [routerLink]="href()"
                [class.full-width]="fullWidth()"
                (click)="onClick($event)">
                <ng-container *ngTemplateOutlet="buttonContent" />
            </a>
        }
        @case ('secondary') {
            <a
                mat-stroked-button
                color="primary"
                [routerLink]="href()"
                [class.full-width]="fullWidth()"
                (click)="onClick($event)">
                <ng-container *ngTemplateOutlet="buttonContent" />
            </a>
        }
        @default {
            <a
                mat-button
                [routerLink]="href()"
                [class.full-width]="fullWidth()"
                (click)="onClick($event)">
                <ng-container *ngTemplateOutlet="buttonContent" />
            </a>
        }
    }
} @else {
    @switch (variant()) {
        @case ('primary') {
            <button
                mat-flat-button
                color="primary"
                [type]="type()"
                [disabled]="disabled() || loading()"
                [class.full-width]="fullWidth()"
                (click)="onClick($event)">
                <ng-container *ngTemplateOutlet="buttonContent" />
            </button>
        }
        @case ('secondary') {
            <button
                mat-stroked-button
                color="primary"
                [type]="type()"
                [disabled]="disabled() || loading()"
                [class.full-width]="fullWidth()"
                (click)="onClick($event)">
                <ng-container *ngTemplateOutlet="buttonContent" />
            </button>
        }
        @default {
            <button
                mat-button
                [type]="type()"
                [disabled]="disabled() || loading()"
                [class.full-width]="fullWidth()"
                (click)="onClick($event)">
                <ng-container *ngTemplateOutlet="buttonContent" />
            </button>
        }
    }
}
