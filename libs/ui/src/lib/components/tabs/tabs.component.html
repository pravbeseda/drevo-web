<nav
    mat-tab-nav-bar
    [tabPanel]="tabPanel"
>
    @for (tab of tabs(); track tab.route) {
        <a
            mat-tab-link
            [routerLink]="tab.route"
            routerLinkActive
            #rla="routerLinkActive"
            [active]="rla.isActive"
            [attr.data-testid]="tab.testId ?? null"
        >
            {{ tab.label }}
            @if (tab.badge !== undefined) {
                <ui-badge [value]="tab.badge" />
            }
        </a>
    }
</nav>
<mat-tab-nav-panel #tabPanel>
    <ng-content />
</mat-tab-nav-panel>
