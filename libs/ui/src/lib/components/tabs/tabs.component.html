<nav mat-tab-nav-bar [tabPanel]="tabPanel">
    @for (tab of tabs(); track tab.route) {
        <a
            mat-tab-link
            [routerLink]="tab.route"
            routerLinkActive
            #rla="routerLinkActive"
            [active]="rla.isActive">
            {{ tab.label }}
            @if (tab.badge !== undefined) {
                <span class="tab-badge">{{ tab.badge }}</span>
            }
        </a>
    }
</nav>
<mat-tab-nav-panel #tabPanel>
    <ng-content />
</mat-tab-nav-panel>
