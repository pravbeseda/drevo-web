<button
    class="fab"
    [class.fab-primary]="priority() === 'primary'"
    [class.fab-secondary]="priority() === 'secondary'"
    [class.fab-main]="variant() === 'main'"
    [class.fab-menu]="variant() === 'menu'"
    [class.fab-speed-dial-item]="variant() === 'speed-dial'"
    [attr.aria-label]="label()"
    (click)="onClick()">
    <span class="material-icons">{{ icon() }}</span>
    @if (showTooltip()) {
        <span class="fab-tooltip">{{ label() }}</span>
    }
    @if (showLabel()) {
        <span class="fab-label">{{ label() }}</span>
    }
</button>
