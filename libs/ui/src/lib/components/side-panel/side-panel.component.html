@if (open()) {
    <div
        class="side-panel-backdrop"
        data-testid="side-panel-backdrop"
        role="none"
        tabindex="-1"
        (click)="close()"></div>
}
<div
    class="side-panel"
    data-testid="side-panel"
    [class.open]="open()"
    role="dialog"
    [attr.aria-modal]="open() || null"
    [attr.aria-hidden]="!open()"
    [attr.inert]="!open() || null"
    [attr.aria-label]="title()">
    <div class="side-panel-header">
        <span
            class="side-panel-title"
            data-testid="side-panel-title">
            {{ title() }}
        </span>
        <ui-icon-button
            icon="close"
            label="Закрыть"
            (clicked)="close()" />
    </div>
    <div
        class="side-panel-content"
        data-testid="side-panel-content">
        <ng-content />
    </div>
</div>
