@if (open()) {
    <div
        class="side-panel-backdrop"
        role="button"
        tabindex="-1"
        aria-label="Закрыть"
        (click)="close()"
        (keydown.enter)="close()"></div>
}
<div
    class="side-panel"
    [class.open]="open()"
    role="dialog"
    aria-modal="true">
    <div class="side-panel-header">
        <span class="side-panel-title">{{ title() }}</span>
        <ui-icon-button
            icon="close"
            (clicked)="close()" />
    </div>
    <div class="side-panel-content">
        <ng-content />
    </div>
</div>
