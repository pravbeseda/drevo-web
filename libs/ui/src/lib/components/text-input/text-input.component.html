<mat-form-field appearance="outline">
    @if (label()) {
        <mat-label>{{ label() }}</mat-label>
    }

    @if (multiline()) {
        <textarea
            matInput
            [value]="value()"
            [rows]="rows()"
            [placeholder]="placeholder()"
            [autocomplete]="autocomplete()"
            [disabled]="disabled() || isDisabled()"
            [readonly]="readonly()"
            [required]="required()"
            [attr.maxlength]="maxLength()"
            [attr.minlength]="minLength()"
            (input)="onInput($event)"
            (blur)="onBlur()"
        ></textarea>
    } @else {
        <input
            matInput
            [type]="type()"
            [value]="value()"
            [placeholder]="placeholder()"
            [autocomplete]="autocomplete()"
            [disabled]="disabled() || isDisabled()"
            [readonly]="readonly()"
            [required]="required()"
            [attr.maxlength]="maxLength()"
            [attr.minlength]="minLength()"
            (input)="onInput($event)"
            (blur)="onBlur()"
        />
    }

    @if (hint() && !errorMessage()) {
        <mat-hint>{{ hint() }}</mat-hint>
    }

    @if (errorMessage()) {
        <mat-error>{{ errorMessage() }}</mat-error>
    }
</mat-form-field>
