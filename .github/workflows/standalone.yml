name: CI/CD Standalone

on:
    push:
        branches: [standalone]
    pull_request:
        branches: [standalone]

permissions:
    contents: read

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'yarn'

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Install Playwright
              run: yarn playwright install --with-deps

            - uses: nrwl/nx-set-shas@v4
              with:
                  main-branch-name: 'standalone'

            - name: Run affected tasks
              run: |
                  yarn nx affected -t lint --parallel=3
                  yarn nx affected -t test --parallel=3
                  yarn nx affected -t e2e

            - name: Build verification
              run: |
                  echo "🔍 Verifying standalone build..."
                  npx nx build client --configuration=production
                  echo "✅ Standalone build successful"

    deploy:
        if: github.event_name == 'push' && github.ref == 'refs/heads/standalone'
        needs: ci
        runs-on: ubuntu-latest
        environment: standalone

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'yarn'

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Generate version and build
              id: build
              env:
                  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
              run: |
                  VERSION=$(date +'%Y%m%d-%H%M')
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "📋 Building standalone version: $VERSION"

                  # Replace version placeholder
                  sed -i "s/__VERSION_PLACEHOLDER__/$VERSION/g" apps/client/src/environments/environment.prod.ts

                  # Replace Sentry DSN placeholder
                  if [ -n "$SENTRY_DSN" ]; then
                    echo "Configuring Sentry DSN..."
                    sed -i "s|__SENTRY_DSN_PLACEHOLDER__|$SENTRY_DSN|g" apps/client/src/environments/environment.prod.ts
                  else
                    echo "Warning: SENTRY_DSN secret is not set, Sentry will be disabled"
                    sed -i "s|__SENTRY_DSN_PLACEHOLDER__||g" apps/client/src/environments/environment.prod.ts
                  fi

                  # Verify the replacement (hide sensitive DSN)
                  echo "Environment file after replacement:"
                  if [ -n "$SENTRY_DSN" ]; then
                    # Use awk to avoid sed escaping issues with special characters in DSN URL
                    awk -v dsn="$SENTRY_DSN" '{gsub(dsn, "[SENTRY_DSN_HIDDEN]"); print}' apps/client/src/environments/environment.prod.ts
                  else
                    cat apps/client/src/environments/environment.prod.ts
                  fi

                  npx nx build client --configuration=production

            - name: Upload source maps to Sentry
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
                  VERSION: ${{ steps.build.outputs.version }}
              run: |
                  if [ -z "$SENTRY_AUTH_TOKEN" ]; then
                    echo "⚠️ SENTRY_AUTH_TOKEN not set, skipping source map upload"
                    exit 0
                  fi

                  if [ -z "$SENTRY_ORG" ] || [ -z "$SENTRY_PROJECT" ]; then
                    echo "⚠️ SENTRY_ORG or SENTRY_PROJECT not set, skipping source map upload"
                    exit 0
                  fi

                  fail_step() {
                    echo "❌ $1"
                    exit 1
                  }

                  echo "📤 Uploading source maps to Sentry for release $VERSION..."

                  echo "🔹 Uploading source maps from ./dist/apps/client/browser..."
                  if ! npx sentry-cli sourcemaps upload \
                    --release="$VERSION" \
                    --url-prefix "~/" \
                    ./dist/apps/client/browser; then
                    fail_step "Sentry source map upload failed for version $VERSION"
                  fi

                  echo "✅ Source maps uploaded for release $VERSION"

            - name: Deploy
              uses: ./.github/actions/deploy
              with:
                  environment: 'standalone'
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
                  ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
                  ssh-user: ${{ secrets.SSH_USER }}
                  ssh-host: ${{ secrets.SSH_HOST }}
                  ssh-port: ${{ secrets.SSH_PORT || '22' }}
                  source-path: 'dist/apps/client'
                  target-path: 'standalone'
                  version: ${{ steps.build.outputs.version }}

            - name: Notify deployment
              if: always()
              run: |
                  if [ "${{ job.status }}" == "success" ]; then
                    echo "✅ Standalone deployment successful"
                  else
                    echo "❌ Standalone deployment failed"
                    exit 1
                  fi
