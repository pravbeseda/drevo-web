name: Test Coverage

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: 'pages'
    cancel-in-progress: true

jobs:
    coverage:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: '20'
                  cache: 'yarn'

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            # --- Unit coverage ---

            - name: Run unit tests with coverage
              run: yarn test:coverage

            # --- Integration coverage ---

            # TODO: extract Playwright cache+install steps into .github/actions/setup-playwright composite action
            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
                  restore-keys: |
                      playwright-${{ runner.os }}-

            - name: Install Playwright Chromium
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install chromium --with-deps

            - name: Install Playwright deps (cached)
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: npx playwright install-deps chromium

            # Save unit coverage before Playwright (monocart-reporter cleans coverage/ dir)
            - name: Save unit coverage
              run: cp -r coverage coverage-unit

            - name: Run integration tests with coverage
              run: yarn test:playwright:coverage
              env:
                  CI: true

            # --- Merge reports ---

            - name: Merge coverage reports
              run: |
                  mkdir -p coverage/merged

                  # --- Unit coverage badge ---
                  TOTAL_LINES=0
                  COVERED_LINES=0

                  for dir in coverage-unit/apps/* coverage-unit/libs/*; do
                    if [ -f "$dir/coverage-summary.json" ]; then
                      LINES=$(jq '.total.lines.total' "$dir/coverage-summary.json")
                      COVERED=$(jq '.total.lines.covered' "$dir/coverage-summary.json")
                      TOTAL_LINES=$((TOTAL_LINES + LINES))
                      COVERED_LINES=$((COVERED_LINES + COVERED))
                    fi
                  done

                  if [ $TOTAL_LINES -gt 0 ]; then
                    UNIT_PCT=$(echo "scale=2; $COVERED_LINES * 100 / $TOTAL_LINES" | bc)
                  else
                    UNIT_PCT=0
                  fi

                  echo "Unit coverage: $UNIT_PCT%"

                  if (( $(echo "$UNIT_PCT >= 80" | bc -l) )); then
                    UNIT_COLOR="brightgreen"
                  elif (( $(echo "$UNIT_PCT >= 60" | bc -l) )); then
                    UNIT_COLOR="yellow"
                  else
                    UNIT_COLOR="red"
                  fi

                  cat > coverage/merged/badge.json << EOF
                  {
                    "schemaVersion": 1,
                    "label": "unit",
                    "message": "${UNIT_PCT}%",
                    "color": "$UNIT_COLOR"
                  }
                  EOF

                  # --- Integration coverage badge ---
                  INT_PCT=0
                  INT_SUMMARY="coverage/integration/coverage-summary.json"
                  if [ -f "$INT_SUMMARY" ]; then
                    INT_PCT=$(jq '.total.lines.pct' "$INT_SUMMARY")
                    echo "Integration coverage: $INT_PCT%"
                  fi

                  if (( $(echo "$INT_PCT >= 80" | bc -l) )); then
                    INT_COLOR="brightgreen"
                  elif (( $(echo "$INT_PCT >= 60" | bc -l) )); then
                    INT_COLOR="yellow"
                  else
                    INT_COLOR="red"
                  fi

                  cat > coverage/merged/badge-integration.json << EOF
                  {
                    "schemaVersion": 1,
                    "label": "playwright",
                    "message": "${INT_PCT}%",
                    "color": "$INT_COLOR"
                  }
                  EOF

                  # --- Index page ---
                  cat > coverage/merged/index.html << 'HTMLEOF'
                  <!DOCTYPE html>
                  <html>
                  <head>
                    <title>Coverage Reports</title>
                    <style>
                      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
                      h1 { color: #333; }
                      h2 { color: #555; margin-top: 30px; }
                      ul { list-style: none; padding: 0; }
                      li { margin: 10px 0; }
                      a { color: #0366d6; text-decoration: none; font-size: 18px; }
                      a:hover { text-decoration: underline; }
                    </style>
                  </head>
                  <body>
                    <h1>Coverage Reports</h1>
                    <h2>Unit Tests (Jest)</h2>
                    <ul>
                      <li><a href="apps/client/index.html">client</a></li>
                      <li><a href="libs/core/index.html">core</a></li>
                      <li><a href="libs/editor/index.html">editor</a></li>
                      <li><a href="libs/shared/index.html">shared</a></li>
                      <li><a href="libs/ui/index.html">ui</a></li>
                    </ul>
                    <h2>Integration Tests (Playwright)</h2>
                    <ul>
                      <li><a href="integration/index.html">Integration Coverage Report</a></li>
                    </ul>
                  </body>
                  </html>
                  HTMLEOF

                  # Copy unit HTML reports from saved directory
                  cp -r coverage-unit/apps coverage/merged/ 2>/dev/null || true
                  cp -r coverage-unit/libs coverage/merged/ 2>/dev/null || true
                  # Copy integration reports + monocart assets (JS app for coverage viewer)
                  cp -r coverage/integration coverage/merged/ 2>/dev/null || true
                  cp -r coverage/assets coverage/merged/ 2>/dev/null || true

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: coverage/merged

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
